<!DOCTYPE html>
<html lang="zh-CN">
<style>
    :root {
        --glass-bg: rgba(255, 255, 255, 0.15);
        --glass-border: rgba(255, 255, 255, 0.3);
        --accent-color: #ffffff;
    }

    body {
        margin: 0;
        height: 100vh;
        display: flex;
        justify-content: center;
        align-items: center;
        font-family: 'Inter', 'SF Pro Display', -apple-system, sans-serif;
        /* 💡 核心升级：高级弥散背景 */
        /* 这种多色混合背景能让毛玻璃的“透视感”发挥到极致 */
        background-color: #e5e5f7;
        background: 
            radial-gradient(at 0% 0%, rgba(144, 202, 249, 0.5) 0px, transparent 50%),
            radial-gradient(at 50% 0%, rgba(179, 157, 219, 0.5) 0px, transparent 50%),
            radial-gradient(at 100% 0%, rgba(255, 204, 225, 0.5) 0px, transparent 50%),
            radial-gradient(at 50% 100%, rgba(129, 212, 250, 0.4) 0px, transparent 50%),
            radial-gradient(at 0% 100%, rgba(188, 170, 255, 0.4) 0px, transparent 50%);
        background-attachment: fixed;
        overflow: hidden;
    }

    /* 💡 高级感卡片：多层光影 */
    .login-card {
        position: relative;
        width: 360px;
        padding: 50px 40px;
        background: var(--glass-bg);
        /* 深度模糊，像磨砂玻璃一样厚实 */
        backdrop-filter: blur(40px) saturate(180%);
        -webkit-backdrop-filter: blur(40px) saturate(180%);
        
        /* 玻璃边缘的高光效果 */
        border: 1px solid var(--glass-border);
        border-radius: 32px;
        
        /* 双层阴影：底层大范围柔和投影 + 近层清晰投影 */
        box-shadow: 
            0 8px 32px 0 rgba(31, 38, 135, 0.07),
            0 1px 2px 0 rgba(255, 255, 255, 0.3) inset; /* 内部边缘高光 */
        
        text-align: center;
        animation: cardFadeIn 0.8s ease-out;
    }

    /* 字体与排版优化 */
    .login-card h3 {
        color: #1d1d1f;
        font-size: 26px;
        font-weight: 700;
        margin-bottom: 35px;
        letter-spacing: -0.8px;
        background: linear-gradient(135deg, #1d1d1f 0%, #434343 100%);
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
    }

    /* 输入框：透明且优雅 */
    .login-card input {
        width: 100%;
        box-sizing: border-box;
        margin: 12px 0;
        padding: 16px 20px;
        background: rgba(255, 255, 255, 0.3);
        border: 1px solid rgba(255, 255, 255, 0.2);
        border-radius: 16px;
        font-size: 15px;
        color: #1d1d1f;
        outline: none;
        transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
    }

    .login-card input::placeholder {
        color: rgba(0, 0, 0, 0.4);
    }

    .login-card input:focus {
        background: rgba(255, 255, 255, 0.6);
        border-color: #007AFF;
        box-shadow: 0 0 0 4px rgba(0, 122, 255, 0.15);
    }

    /* 按钮：晶莹剔透的渐变感 */
    .login-card button {
        width: 100%;
        margin-top: 30px;
        padding: 18px;
        background: linear-gradient(135deg, #007AFF 0%, #0055FF 100%);
        color: white;
        border: none;
        border-radius: 18px;
        font-size: 17px;
        font-weight: 600;
        cursor: pointer;
        box-shadow: 0 10px 25px -5px rgba(0, 122, 255, 0.4);
        transition: all 0.3s ease;
    }

    .login-card button:hover {
        transform: translateY(-2px);
        box-shadow: 0 15px 30px -5px rgba(0, 122, 255, 0.5);
        filter: brightness(1.1);
    }

    .login-card button:active {
        transform: scale(0.98);
    }

    /* 入场动画 */
    @keyframes cardFadeIn {
        from { opacity: 0; transform: translateY(20px); }
        to { opacity: 1; transform: translateY(0); }
    }

    #coze-container {
        display: none;
        width: 100vw;
        height: 100vh;
    }
</style>
<body>

    <div class="login-card" id="login-box">
        <h3>实验数据录入</h3>
        <input type="text" id="className" placeholder="请输入班级 (例: 计科1班)">
        <input type="text" id="studentId" placeholder="请输入学号 (例: 2024001)">
        <input type="text" id="sessionNum" placeholder="请输入课次 (例: 1)">
        <button onclick="startChat()">进入智能体</button>
    </div>

    <div id="coze-container"></div>

    <script>
        // 你在腾讯云配置好的专属 Token 派发接口
        const API_URL = "https://1308037263-lxn5m4tut3.ap-guangzhou.tencentscf.com";

        async function startChat() {
            const cls = document.getElementById('className').value.trim();
            const stu = document.getElementById('studentId').value.trim();
            const ses = document.getElementById('sessionNum').value.trim();

            if (!cls || !stu || !ses) {
                alert("班级、学号和课次都必须填写完整哦！");
                return;
            }

            // 拼接唯一的用户 ID，用于后端数据隔离
            const uniqueUserId = `${cls}_${stu}_${ses}`; 
            
            const btn = document.querySelector('button');
            btn.innerText = "正在分配专属通道...";
            btn.disabled = true;

            try {
                // 1. 向腾讯云请求 Token
                const response = await fetch(API_URL, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' }
                });
                
                const result = await response.json();
                if (result.code !== 0) throw new Error("获取 Token 失败");
                const dynamicToken = result.data.token;

                // 2. 隐藏登录框，显示全屏聊天框
                document.getElementById('login-box').style.display = 'none';
                document.getElementById('coze-container').style.display = 'block';

                // 3. 初始化并挂载扣子聊天组件
                const chatClient = new window.CozeWebSDK.WebChatClient({
                    config: { 
                        bot_id: '7629244922654851135' 
                    },
                    auth: {
                        type: 'token',
                        token: dynamicToken,
                        onRefreshToken: async () => {
                            const refreshResponse = await fetch(API_URL, {
                                method: 'POST',
                                headers: { 'Content-Type': 'application/json' }
                            });
                            const refreshResult = await refreshResponse.json();
                            return refreshResult.data.token;
                        }
                    },
                    userInfo: {
                        id: uniqueUserId,
                        nickname: stu
                    },
                    ui: {
                        asstBtn: {
                            isNeed: false // 关闭悬浮小球
                        },
                        chatBot: {
                            el: document.getElementById('coze-container'), // 挂载到容器
                            layout: 'pc', // 使用宽屏布局
                            width: '100%' // 宽度拉满
                        }
                    }
                });

                // 4. 强制唤醒并展开聊天面板
                chatClient.showChatBot();

            } catch (error) {
                alert("网络连接异常，请按 F12 检查控制台报错！");
                console.error(error);
                btn.innerText = "进入智能体";
                btn.disabled = false;
            }
        }
    </script>
</body>
</html>
